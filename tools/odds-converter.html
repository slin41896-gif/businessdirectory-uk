<style>

<main class="tool-container">
  <p class="section-label">工具中心</p>
  <h1 class="tool-title">體育指數換算</h1>
  <p class="tool-sub">港式 · 歐洲 · 美式 指數即時互換，快速比對各平台賠率</p>

  <div class="tool-card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('hk')">港式輸入</button>
      <button class="tab-btn" onclick="switchTab('eu')">歐式輸入</button>
      <button class="tab-btn" onclick="switchTab('us')">美式輸入</button>
    </div>

    <!-- 港式輸入 -->
    <div id="tab-hk">
      <div class="form-group">
        <label class="form-label">港式指數（HK Odds）</label>
        <input type="number" id="hk-input" class="form-input" value="1.80" step="0.01" min="0.01" placeholder="例：1.80">
      </div>
      <button class="calc-btn" onclick="convertFromHK()">立即換算</button>
    </div>

    <!-- 歐式輸入 -->
    <div id="tab-eu" style="display:none">
      <div class="form-group">
        <label class="form-label">歐式指數（Decimal Odds）</label>
        <input type="number" id="eu-input" class="form-input" value="2.80" step="0.01" min="1.01" placeholder="例：2.80">
      </div>
      <button class="calc-btn" onclick="convertFromEU()">立即換算</button>
    </div>

    <!-- 美式輸入 -->
    <div id="tab-us" style="display:none">
      <div class="form-group">
        <label class="form-label">美式指數（American Odds）</label>
        <input type="number" id="us-input" class="form-input" value="180" step="1" placeholder="例：+180 或 -150">
      </div>
      <button class="calc-btn" onclick="convertFromUS()">立即換算</button>
    </div>

    <!-- 結果 -->
    <div class="result-grid">
      <div class="result-item">
        <div class="result-item-label">港式指數</div>
        <div class="result-item-value" id="res-hk">1.80</div>
        <div class="result-item-sub">HK Odds</div>
      </div>
      <div class="result-item">
        <div class="result-item-label">歐式指數</div>
        <div class="result-item-value" id="res-eu">2.80</div>
        <div class="result-item-sub">Decimal</div>
      </div>
      <div class="result-item">
        <div class="result-item-label">美式指數</div>
        <div class="result-item-value" id="res-us">+180</div>
        <div class="result-item-sub">American</div>
      </div>
    </div>

    <div class="prob-bar-wrap">
      <div class="prob-bar-label">
        <span>隱含勝率</span>
        <span id="res-prob">35.7%</span>
      </div>
      <div class="prob-bar-track">
        <div class="prob-bar-fill" id="prob-bar" style="width:35.7%"></div>
      </div>
    </div>
  </div>

  <div class="cta-section">
    <div class="cta-title">找到好賠率？立即出擊！</div>
    <div class="cta-sub">新會員獨家好禮，讓你本金更充裕</div>
    <a href="https://lokguhk.com?p=998307" class="btn-cta" target="_blank">🎁 立即領取新會員好禮</a>
  </div>
</main>

<script>
let activeTab = 'hk';

function switchTab(tab) {
  document.getElementById('tab-hk').style.display = tab === 'hk' ? '' : 'none';
  document.getElementById('tab-eu').style.display = tab === 'eu' ? '' : 'none';
  document.getElementById('tab-us').style.display = tab === 'us' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['hk','eu','us'][i] === tab);
  });
  activeTab = tab;
}

function updateResults(hk, eu, us, prob) {
  document.getElementById('res-hk').textContent = hk.toFixed(2);
  document.getElementById('res-eu').textContent = eu.toFixed(2);
  document.getElementById('res-us').textContent = us >= 0 ? '+' + Math.round(us) : Math.round(us);
  const pct = (prob * 100).toFixed(1) + '%';
  document.getElementById('res-prob').textContent = pct;
  document.getElementById('prob-bar').style.width = pct;
}

function convertFromHK() {
  const hk = parseFloat(document.getElementById('hk-input').value);
  if (isNaN(hk) || hk <= 0) return;
  const eu = hk + 1;
  const us = eu >= 2 ? (eu - 1) * 100 : -100 / (eu - 1);
  const prob = 1 / eu;
  updateResults(hk, eu, us, prob);
}

function convertFromEU() {
  const eu = parseFloat(document.getElementById('eu-input').value);
  if (isNaN(eu) || eu <= 1) return;
  const hk = eu - 1;
  const us = eu >= 2 ? (eu - 1) * 100 : -100 / (eu - 1);
  const prob = 1 / eu;
  updateResults(hk, eu, us, prob);
}

function convertFromUS() {
  const us = parseFloat(document.getElementById('us-input').value);
  if (isNaN(us)) return;
  let eu;
  if (us > 0) {
    eu = us / 100 + 1;
  } else {
    eu = 100 / Math.abs(us) + 1;
  }
  const hk = eu - 1;
  const prob = 1 / eu;
  updateResults(hk, eu, us, prob);
}

// 初始化
convertFromHK();
</script>
